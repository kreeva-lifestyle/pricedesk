name: Daily Database Backup

on:
  schedule:
    # Run at midnight IST (18:30 UTC previous day)
    - cron: '30 18 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Create daily backup
        env:
          SUPABASE_URL: 'https://fcmesdnagvrdmjzzuwue.supabase.co'
          SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjbWVzZG5hZ3ZyZG1qenp1d3VlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNjM4NTgsImV4cCI6MjA4OTczOTg1OH0.fS1ecV898Dmrka6hr3R0RE6gcKlneWUPbDyDPv30_qU'
        run: |
          set -e
          echo "=== PriceDesk Daily Backup ==="
          echo "Date: $(date -u '+%Y-%m-%d %H:%M UTC')"
          BACKUP_DATE=$(date -u '+%Y-%m-%d')

          # 1. Read all data from app_data table
          echo "Fetching all data from app_data..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "${SUPABASE_URL}/rest/v1/app_data?select=*" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Failed to fetch data (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi

          ROW_COUNT=$(echo "$BODY" | jq 'length')
          echo "Fetched $ROW_COUNT rows from app_data"

          # 1b. Read all SKUs from pd_skus_v2 (paginated, 1000 per request)
          echo "Fetching all SKUs from pd_skus_v2..."
          ALL_SKUS="[]"
          OFFSET=0
          while true; do
            SKU_RESP=$(curl -s -w "\n%{http_code}" \
              "${SUPABASE_URL}/rest/v1/pd_skus_v2?select=*&order=id&offset=${OFFSET}&limit=1000" \
              -H "apikey: ${SUPABASE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_KEY}")
            SKU_CODE=$(echo "$SKU_RESP" | tail -1)
            SKU_BODY=$(echo "$SKU_RESP" | sed '$d')
            if [ "$SKU_CODE" != "200" ]; then
              echo "Warning: Failed to fetch SKUs at offset $OFFSET (HTTP $SKU_CODE)"
              break
            fi
            PAGE_COUNT=$(echo "$SKU_BODY" | jq 'length')
            if [ "$PAGE_COUNT" -eq 0 ]; then break; fi
            ALL_SKUS=$(echo "$ALL_SKUS" "$SKU_BODY" | jq -s '.[0] + .[1]')
            OFFSET=$((OFFSET + 1000))
            if [ "$PAGE_COUNT" -lt 1000 ]; then break; fi
          done
          SKU_TOTAL=$(echo "$ALL_SKUS" | jq 'length')
          echo "Fetched $SKU_TOTAL SKUs from pd_skus_v2"

          # 1c. Helper: fetch all rows from a table with pagination
          fetch_table () {
            local table="$1"
            local order_col="${2:-id}"
            local all="[]"
            local off=0
            while true; do
              local resp code body
              resp=$(curl -s -w "\n%{http_code}" \
                "${SUPABASE_URL}/rest/v1/${table}?select=*&order=${order_col}&offset=${off}&limit=1000" \
                -H "apikey: ${SUPABASE_KEY}" \
                -H "Authorization: Bearer ${SUPABASE_KEY}")
              code=$(echo "$resp" | tail -1)
              body=$(echo "$resp" | sed '$d')
              if [ "$code" != "200" ]; then
                echo "Warning: ${table} fetch failed at offset ${off} (HTTP $code)" >&2
                break
              fi
              local page_count
              page_count=$(echo "$body" | jq 'length')
              if [ "$page_count" -eq 0 ]; then break; fi
              all=$(echo "$all" "$body" | jq -s '.[0] + .[1]')
              off=$((off + 1000))
              if [ "$page_count" -lt 1000 ]; then break; fi
            done
            echo "$all"
          }

          # 1d. Fetch the 6 normalized tables (Phase 1)
          echo "Fetching pd_brands..."
          ALL_BRANDS=$(fetch_table pd_brands id)
          BRANDS_TOTAL=$(echo "$ALL_BRANDS" | jq 'length')
          echo "  $BRANDS_TOTAL brands"

          echo "Fetching pd_categories..."
          ALL_CATEGORIES=$(fetch_table pd_categories name)
          CATS_TOTAL=$(echo "$ALL_CATEGORIES" | jq 'length')
          echo "  $CATS_TOTAL categories"

          echo "Fetching pd_commissions..."
          ALL_COMMISSIONS=$(fetch_table pd_commissions marketplace)
          COMM_TOTAL=$(echo "$ALL_COMMISSIONS" | jq 'length')
          echo "  $COMM_TOTAL commission rows"

          echo "Fetching pd_thresholds..."
          ALL_THRESHOLDS=$(fetch_table pd_thresholds category)
          THRESH_TOTAL=$(echo "$ALL_THRESHOLDS" | jq 'length')
          echo "  $THRESH_TOTAL thresholds"

          echo "Fetching pd_audit_log..."
          ALL_AUDIT=$(fetch_table pd_audit_log id)
          AUDIT_TOTAL=$(echo "$ALL_AUDIT" | jq 'length')
          echo "  $AUDIT_TOTAL audit entries"

          echo "Fetching pd_sku_history..."
          ALL_HISTORY=$(fetch_table pd_sku_history id)
          HIST_TOTAL=$(echo "$ALL_HISTORY" | jq 'length')
          echo "  $HIST_TOTAL history entries"

          # 2. Insert backup into pd_backups table
          echo "Creating backup for $BACKUP_DATE..."
          BACKUP_PAYLOAD=$(jq -n \
            --arg date "$BACKUP_DATE" \
            --argjson data "$BODY" \
            --argjson skus "$ALL_SKUS" \
            --argjson brands "$ALL_BRANDS" \
            --argjson categories "$ALL_CATEGORIES" \
            --argjson commissions "$ALL_COMMISSIONS" \
            --argjson thresholds "$ALL_THRESHOLDS" \
            --argjson audit_log "$ALL_AUDIT" \
            --argjson sku_history "$ALL_HISTORY" \
            '{backup_date: $date, data: {
              app_data: $data,
              pd_skus_v2: $skus,
              pd_brands: $brands,
              pd_categories: $categories,
              pd_commissions: $commissions,
              pd_thresholds: $thresholds,
              pd_audit_log: $audit_log,
              pd_sku_history: $sku_history
            }, created_at: (now | strftime("%Y-%m-%dT%H:%M:%SZ"))}')

          UPSERT_RESPONSE=$(curl -s -w "\n%{http_code}" \
            "${SUPABASE_URL}/rest/v1/pd_backups" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "$BACKUP_PAYLOAD")

          UPSERT_CODE=$(echo "$UPSERT_RESPONSE" | tail -1)
          UPSERT_BODY=$(echo "$UPSERT_RESPONSE" | sed '$d')

          if [ "$UPSERT_CODE" != "201" ] && [ "$UPSERT_CODE" != "200" ]; then
            echo "ERROR: Failed to save backup (HTTP $UPSERT_CODE)"
            echo "$UPSERT_BODY"
            exit 1
          fi

          echo "✓ Backup saved for $BACKUP_DATE ($ROW_COUNT app_data, $SKU_TOTAL SKUs, $BRANDS_TOTAL brands, $CATS_TOTAL cats, $COMM_TOTAL comm, $THRESH_TOTAL thresh, $AUDIT_TOTAL audit, $HIST_TOTAL hist)"

          # 3. Delete backups older than 7 days
          CUTOFF_DATE=$(date -u -d '7 days ago' '+%Y-%m-%d')
          echo "Cleaning up backups older than $CUTOFF_DATE..."

          DELETE_RESPONSE=$(curl -s -w "\n%{http_code}" \
            "${SUPABASE_URL}/rest/v1/pd_backups?backup_date=lt.${CUTOFF_DATE}" \
            -X DELETE \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Prefer: return=representation")

          DELETE_CODE=$(echo "$DELETE_RESPONSE" | tail -1)
          DELETE_BODY=$(echo "$DELETE_RESPONSE" | sed '$d')

          if [ "$DELETE_CODE" = "200" ]; then
            DELETED_COUNT=$(echo "$DELETE_BODY" | jq 'length')
            echo "✓ Deleted $DELETED_COUNT old backup(s)"
          else
            echo "Warning: Cleanup returned HTTP $DELETE_CODE (non-critical)"
          fi

          # 4. Show current backup inventory
          echo ""
          echo "=== Current Backups ==="
          INVENTORY=$(curl -s \
            "${SUPABASE_URL}/rest/v1/pd_backups?select=backup_date,created_at&order=backup_date.desc" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}")

          echo "$INVENTORY" | jq -r '.[] | "  \(.backup_date)  (created: \(.created_at))"'
          TOTAL=$(echo "$INVENTORY" | jq 'length')
          echo "Total backups: $TOTAL"
          echo ""
          echo "=== Backup Complete ==="
