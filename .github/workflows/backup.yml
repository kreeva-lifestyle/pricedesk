name: Daily Database Backup

on:
  schedule:
    # Run at midnight IST (18:30 UTC previous day)
    - cron: '30 18 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Create daily backup
        env:
          SUPABASE_URL: 'https://fcmesdnagvrdmjzzuwue.supabase.co'
          SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjbWVzZG5hZ3ZyZG1qenp1d3VlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNjM4NTgsImV4cCI6MjA4OTczOTg1OH0.fS1ecV898Dmrka6hr3R0RE6gcKlneWUPbDyDPv30_qU'
          # Rows kept per unbounded table in the daily backup. A 7-day rolling
          # backup gains nothing from re-copying the entire append-only
          # audit/history tables every night — that is what made payloads
          # grow without limit and killed this job.
          AUDIT_MAX_ROWS: '5000'
          HISTORY_MAX_ROWS: '10000'
        run: |
          set -euo pipefail
          echo "=== PriceDesk Daily Backup ==="
          echo "Date: $(date -u '+%Y-%m-%d %H:%M UTC')"
          BACKUP_DATE=$(date -u '+%Y-%m-%d')
          WORK="${RUNNER_TEMP:-/tmp}/pd-backup"
          mkdir -p "$WORK"

          # All JSON lives in files, never in shell variables or argv:
          # a single Linux exec argument caps at ~128 KB, so passing the
          # SKU/audit JSON via --argjson or curl -d "$VAR" dies with
          # E2BIG once the data grows. Files have no such limit.

          # req <outfile> <path-and-query> [extra curl args...] -> prints HTTP code
          req() {
            local out="$1" path="$2"; shift 2
            curl -sS -o "$out" -w "%{http_code}" \
              "${SUPABASE_URL}/rest/v1/${path}" \
              -H "apikey: ${SUPABASE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_KEY}" \
              "$@"
          }

          die() { # die <step-name> <http-code> <body-file>
            echo ""
            echo "### FAILED AT: $1 (HTTP $2)"
            echo "--- response body (first 800 bytes):"
            head -c 800 "$3" 2>/dev/null || true
            echo ""
            exit 1
          }

          # ── 1. app_data: fetch key list, then row-by-row ─────────────
          # One `select=*` over the whole table drags every JSONB blob
          # through a single query and times out; per-key requests match
          # how the app itself reads config and stay small.
          CODE=$(req "$WORK/keys.json" "app_data?select=key&order=key")
          if [ "$CODE" != "200" ]; then die "app_data key list" "$CODE" "$WORK/keys.json"; fi
          mapfile -t KEYS < <(jq -r '.[].key' "$WORK/keys.json")
          echo "app_data keys found: ${#KEYS[@]}"

          echo "[]" > "$WORK/app_data.json"
          for k in "${KEYS[@]}"; do
            if [ "$k" = "pd_skus" ]; then
              echo "  ~ skipping legacy blob 'pd_skus' (superseded by pd_skus_v2, backed up below)"
              continue
            fi
            enc=$(jq -rn --arg k "$k" '$k|@uri')
            CODE=$(req "$WORK/row.json" "app_data?select=*&key=eq.${enc}")
            if [ "$CODE" != "200" ]; then die "app_data key '$k'" "$CODE" "$WORK/row.json"; fi
            jq -s '.[0] + .[1]' "$WORK/app_data.json" "$WORK/row.json" > "$WORK/app_data.tmp"
            mv "$WORK/app_data.tmp" "$WORK/app_data.json"
            echo "  ✓ $k ($(wc -c < "$WORK/row.json") bytes)"
          done
          APP_TOTAL=$(jq 'length' "$WORK/app_data.json")
          echo "app_data rows backed up: $APP_TOTAL"

          # ── 2. Paginated table fetch into a file ─────────────────────
          # fetch_table <table> <order> <outfile> [max_rows]
          # max_rows=0 means unlimited. Fatal on any non-200.
          fetch_table() {
            local table="$1" order="$2" out="$3" max="${4:-0}" off=0 code page
            echo "[]" > "$out"
            while true; do
              code=$(req "$WORK/page.json" "${table}?select=*&order=${order}&offset=${off}&limit=1000")
              if [ "$code" != "200" ]; then die "$table (offset $off)" "$code" "$WORK/page.json"; fi
              page=$(jq 'length' "$WORK/page.json")
              if [ "$page" -eq 0 ]; then break; fi
              jq -s '.[0] + .[1]' "$out" "$WORK/page.json" > "$out.tmp"
              mv "$out.tmp" "$out"
              off=$((off + 1000))
              if [ "$page" -lt 1000 ]; then break; fi
              if [ "$max" -gt 0 ] && [ "$off" -ge "$max" ]; then
                echo "  (capped at $max most recent rows)"
                break
              fi
            done
          }

          echo "Fetching pd_skus_v2..."
          fetch_table pd_skus_v2 id "$WORK/skus.json"
          SKU_TOTAL=$(jq 'length' "$WORK/skus.json")
          echo "  $SKU_TOTAL SKUs"

          echo "Fetching pd_brands..."
          fetch_table pd_brands id "$WORK/brands.json"
          BRANDS_TOTAL=$(jq 'length' "$WORK/brands.json")
          echo "  $BRANDS_TOTAL brands"

          echo "Fetching pd_categories..."
          fetch_table pd_categories name "$WORK/categories.json"
          CATS_TOTAL=$(jq 'length' "$WORK/categories.json")
          echo "  $CATS_TOTAL categories"

          echo "Fetching pd_commissions..."
          fetch_table pd_commissions marketplace "$WORK/commissions.json"
          COMM_TOTAL=$(jq 'length' "$WORK/commissions.json")
          echo "  $COMM_TOTAL commission rows"

          echo "Fetching pd_thresholds..."
          fetch_table pd_thresholds category "$WORK/thresholds.json"
          THRESH_TOTAL=$(jq 'length' "$WORK/thresholds.json")
          echo "  $THRESH_TOTAL thresholds"

          echo "Fetching pd_audit_log (newest $AUDIT_MAX_ROWS)..."
          fetch_table pd_audit_log id.desc "$WORK/audit.json" "$AUDIT_MAX_ROWS"
          AUDIT_TOTAL=$(jq 'length' "$WORK/audit.json")
          echo "  $AUDIT_TOTAL audit entries"

          echo "Fetching pd_sku_history (newest $HISTORY_MAX_ROWS)..."
          fetch_table pd_sku_history id.desc "$WORK/history.json" "$HISTORY_MAX_ROWS"
          HIST_TOTAL=$(jq 'length' "$WORK/history.json")
          echo "  $HIST_TOTAL history entries"

          # ── 3. Assemble payload (same shape the in-app restore reads) ─
          echo "Creating backup for $BACKUP_DATE..."
          jq -n \
            --arg date "$BACKUP_DATE" \
            --slurpfile app_data "$WORK/app_data.json" \
            --slurpfile skus "$WORK/skus.json" \
            --slurpfile brands "$WORK/brands.json" \
            --slurpfile categories "$WORK/categories.json" \
            --slurpfile commissions "$WORK/commissions.json" \
            --slurpfile thresholds "$WORK/thresholds.json" \
            --slurpfile audit_log "$WORK/audit.json" \
            --slurpfile sku_history "$WORK/history.json" \
            '{backup_date: $date, data: {
              app_data: $app_data[0],
              pd_skus_v2: $skus[0],
              pd_brands: $brands[0],
              pd_categories: $categories[0],
              pd_commissions: $commissions[0],
              pd_thresholds: $thresholds[0],
              pd_audit_log: $audit_log[0],
              pd_sku_history: $sku_history[0]
            }, created_at: (now | strftime("%Y-%m-%dT%H:%M:%SZ"))}' \
            > "$WORK/payload.json"

          PAYLOAD_BYTES=$(wc -c < "$WORK/payload.json")
          echo "Payload size: $PAYLOAD_BYTES bytes (~$((PAYLOAD_BYTES / 1024 / 1024)) MB)"
          if [ "$PAYLOAD_BYTES" -gt 8388608 ]; then
            echo "WARNING: payload exceeds 8 MB — consider lowering AUDIT_MAX_ROWS/HISTORY_MAX_ROWS before this starts timing out again"
          fi

          # ── 4. Upsert into pd_backups (payload from file, never argv) ─
          UPSERT_CODE=$(req "$WORK/upsert.json" "pd_backups" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            --data-binary "@$WORK/payload.json")
          if [ "$UPSERT_CODE" != "201" ] && [ "$UPSERT_CODE" != "200" ]; then
            die "pd_backups upsert" "$UPSERT_CODE" "$WORK/upsert.json"
          fi
          echo "✓ Backup saved for $BACKUP_DATE ($APP_TOTAL app_data, $SKU_TOTAL SKUs, $BRANDS_TOTAL brands, $CATS_TOTAL cats, $COMM_TOTAL comm, $THRESH_TOTAL thresh, $AUDIT_TOTAL audit, $HIST_TOTAL hist)"

          # ── 5. Delete backups older than 7 days (non-fatal) ──────────
          CUTOFF_DATE=$(date -u -d '7 days ago' '+%Y-%m-%d')
          echo "Cleaning up backups older than $CUTOFF_DATE..."
          DELETE_CODE=$(req "$WORK/delete.json" "pd_backups?backup_date=lt.${CUTOFF_DATE}" \
            -X DELETE -H "Prefer: return=representation")
          if [ "$DELETE_CODE" = "200" ]; then
            echo "✓ Deleted $(jq 'length' "$WORK/delete.json") old backup(s)"
          else
            echo "Warning: cleanup returned HTTP $DELETE_CODE (non-critical)"
          fi

          # ── 6. Show current backup inventory (non-fatal) ─────────────
          echo ""
          echo "=== Current Backups ==="
          INV_CODE=$(req "$WORK/inventory.json" "pd_backups?select=backup_date,created_at&order=backup_date.desc")
          if [ "$INV_CODE" = "200" ]; then
            jq -r '.[] | "  \(.backup_date)  (created: \(.created_at))"' "$WORK/inventory.json"
            echo "Total backups: $(jq 'length' "$WORK/inventory.json")"
          else
            echo "Warning: inventory returned HTTP $INV_CODE"
          fi
          echo ""
          echo "=== Backup Complete ==="
